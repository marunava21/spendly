<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spendly - Advertisement Showcase</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="showcase-container">
        <!-- Advertising Text Section -->
        <div class="text-container">
            <h1 id="ad-title">Spendly</h1>
            <p id="ad-subtitle">The smarter way to track your finances.</p>
        </div>

        <!-- 3D Scene for Phone Mockup -->
        <div class="scene">
            <div class="phone">
                <!-- Phone Frame (Thickness/Depth) -->
                <div class="phone-frame front">
                    <div class="notch"></div>
                    <div class="screen-container">
                        <img src="img1.png" alt="Screenshot 1" class="screen-img active" id="img-1">
                        <img src="img2.png" alt="Screenshot 2" class="screen-img" id="img-2">
                        <img src="img3.png" alt="Screenshot 3" class="screen-img" id="img-3">
                        <img src="img4.png" alt="Screenshot 4" class="screen-img" id="img-4">
                        <img src="img5.png" alt="Screenshot 5" class="screen-img" id="img-5">
                    </div>
                </div>
                <div class="phone-frame back"></div>
                <div class="phone-frame left"></div>
                <div class="phone-frame right"></div>
                <div class="phone-frame top"></div>
                <div class="phone-frame bottom"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
